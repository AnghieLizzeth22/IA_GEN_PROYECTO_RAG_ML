name: Run RAG Notebook

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Clean and Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Eliminación agresiva de librerías conflictivas pre-instaladas
        pip uninstall -y torch torchvision torchaudio bitsandbytes
        
        # 2. Instalación de versión específica de CPU para evitar el error 'torchvision::nms'
        pip install torch==2.2.1+cpu --index-url https://download.pytorch.org/whl/cpu
        
        # 3. Instalación del resto de dependencias desde requirements.txt
        # Nota: Asegúrate de que tu requirements.txt NO incluya torchvision
        if [ -f requirements.txt ]; then
          grep -vE 'torchvision|bitsandbytes' requirements.txt > req_clean.txt
          pip install -r req_clean.txt
        fi
        
        # 4. Instalamos utilidades necesarias para ejecutar notebooks
        pip install nbconvert ipykernel

    - name: Execute notebook
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        jupyter nbconvert --to notebook --execute notebooks/Proyecto_RAG_paraGit.ipynb --output ../resultado_rag.ipynb

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: notebook-final
        path: resultado_rag.ipynb