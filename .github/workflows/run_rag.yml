name: Run RAG Notebook

on:
  push:
    branches:
      - main
  workflow_dispatch:  # esto permite ejecutar manualmente desde GitHub

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'


    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        pkg-config \
        coinor-libipopt-dev \
        gdal-bin \
        libgdal-dev \
        libcairo2-dev \
        libgirepository1.0-dev \
        gir1.2-gtk-3.0 \
        r-base    
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        grep -v 'google-colab' requirements.txt > req_no_colab.txt
        pip install -r req_no_colab.txt

    - name: Install Jupyter
      run: pip install notebook nbconvert

    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute notebooks/Proyecto_RAG.ipynb --output resultado_rag.ipynb