name: Run RAG Notebook

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install PyTorch CPU
      run: |
        pip install torch==2.2.1+cpu torchvision==0.17.1+cpu torchaudio==2.2.1+cpu --index-url https://download.pytorch.org/whl/cpu

    - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip uninstall -y torch torchvision torchaudio
            pip install torch==2.2.1+cpu torchvision==0.17.1+cpu torchaudio==2.2.1+cpu --index-url https://download.pytorch.org/whl/cpu
            grep -vE 'torch|torchvision|torchaudio|google-colab|bitsandbytes' requirements.txt > req_clean.txt
            pip install -r req_clean.txt
            pip install nbconvert ipykernel

    - name: Execute notebook
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        jupyter nbconvert --to notebook --execute notebooks/Proyecto_RAG.ipynb --output ../resultado_rag.ipynb

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: notebook-final
        path: resultado_rag.ipynb