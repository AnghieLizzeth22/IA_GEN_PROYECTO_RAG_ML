name: Run RAG Notebook

on:
  push:
    branches:
      - main
  workflow_dispatch:  # esto permite ejecutar manualmente desde GitHub

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'


    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          libffi-dev \
          libssl-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype6-dev \
          pkg-config \
          ffmpeg \
          r-base \
          libgirepository1.0-dev \
          libcairo2-dev \
          libpq-dev \
          python3-dev \
          wget \
          coinor-libipopt-dev \
          gdal-bin \
          libgdal-dev  

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        grep -v 'google-colab' requirements.txt > req_no_colab.txt
        # Reemplaza versiones GPU por CPU
        sed -i 's/torchvision==0.25.0+cu128/torchvision==0.25.0/' req_no_colab.txt
        sed -i 's/torchaudio==2.10.0+cu128/torchaudio==2.10.0/' req_no_colab.txt
        sed -i 's/torchcodec==0.10.0+cu128/torchcodec==0.10.0/' req_no_colab.txt
        pip install -r req_no_colab.txt

    - name: Install PyTorch (CPU version)
      run: |
        pip install torch==2.0.1+cpu torchaudio==2.10.0+cpu --index-url https://download.pytorch.org/whl/cpu

    - name: Install Jupyter
      run: pip install notebook nbconvert

    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute notebooks/Proyecto_RAG.ipynb --output resultado_rag.ipynb