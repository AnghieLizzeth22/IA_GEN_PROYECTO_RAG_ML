name: Run RAG Notebook

on:
  push:
    branches:
      - main
  workflow_dispatch:  # esto permite ejecutar manualmente desde GitHub

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'


    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config coinor-libipopt-dev gdal-bin libgdal-dev


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Jupyter
      run: pip install notebook nbconvert

    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute notebooks/Proyecto_RAG.ipynb --output resultado_rag.ipynb